# Запуск всей XSS-песочницы одной командой:
#   docker compose up --build
# Затем открыть в браузере:  http://localhost:5173
services:
  backend:
    build: ./backend
    container_name: xss-backend
    ports:
      - "5000:5000"   # API доступно и напрямую: http://localhost:5000

  frontend:
    build: ./frontend
    container_name: xss-frontend
    ports:
      - "5173:5173"
    environment:
      # Внутри Docker-сети бэкенд доступен по имени сервиса "backend".
      - VITE_PROXY_TARGET=http://backend:5000
    depends_on:
      - backend
